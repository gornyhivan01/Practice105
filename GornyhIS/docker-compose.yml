services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [frontend, backend]

  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]

  redis:
    image: redis:alpine

  frontend:
    build: ./frontend
