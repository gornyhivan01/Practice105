name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Запуск при каждом пуше в main
  pull_request:
    branches: [ "main" ]

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Установка pytest для запуска тестов
        pip install pytest 
        # Установка зависимостей из корня проекта или из папок
        if [ -f GornyhIS/requirements.txt ]; then pip install -r GornyhIS/requirements.txt; fi

    - name: Run Backend Tests
      run: |
        # Запуск тестов бэкенда
        pytest GornyhIS/backend/test_app.py

    - name: Run Worker Tests
      run: |
        # Запуск тестов воркера
        pytest GornyhIS/worker/test_tasks.py
